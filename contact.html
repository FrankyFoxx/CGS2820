<body>
<div id="wrapper">

  <header>
    <a href="index.html">
      <img src="images/ffbanner.png" alt="FrankyFoxx Witchy-Gothic Banner" class="site-banner">
    </a>
  </header>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>

    </ul>
  </nav>

  <img src="images/frankyfoxx.jpg" alt="Photo of Franky Foxx" class="profile-pic">

  <h1>Contact Me</h1>

  <main id="contact">

    <!-- ★ Updated to send form data to FormProcess.php -->
    <form action="FormProcess.php" method="post">
      <table>

        <tr>
          <th colspan="2">Contact Information</th>
        </tr>

        <tr>
          <td class="right"><label for="fname"><span class="required">*</span> First Name:</label></td>
          <td><input type="text" id="fname" name="fname" required tabindex="1"></td>
        </tr>

        <tr>
          <td class="right"><label for="lname"><span class="required">*</span> Last Name:</label></td>
          <td><input type="text" id="lname" name="lname" required tabindex="2"></td>
        </tr>

        <tr>
          <td class="right"><label for="city">City:</label></td>
          <td><input type="text" id="city" name="city" tabindex="3"></td>
        </tr>

        <tr>
          <td class="right"><label for="state">ST:</label></td>
          <td>
            <select id="state" name="state" tabindex="4">
              <option value="">Select</option>
              <option>FL</option>
              <option>GA</option>
              <option>AL</option>
              <option>SC</option>
              <option>NC</option>
              <option>TN</option>
              <option>VA</option>
              <option>Other</option>
            </select>
          </td>
        </tr>

        <tr>
          <td class="right"><label for="zip">Zip:</label></td>
          <td><input type="text" id="zip" name="zip" tabindex="5"></td>
        </tr>

        <tr>
          <td class="right"><label for="email"><span class="required">*</span> Email:</label></td>
          <td><input type="email" id="email" name="email" required tabindex="6"></td>
        </tr>

        <tr>
          <td class="right">Gender:</td>
          <td>
            <label><input type="radio" name="gender" value="M" tabindex="7"> M</label>
            <label><input type="radio" name="gender" value="F" tabindex="8"> F</label>
          </td>
        </tr>

        <tr>
          <td class="right">Education:</td>
          <td>
            <label><input type="radio" name="edu" value="AS" tabindex="9"> AS</label>
            <label><input type="radio" name="edu" value="BS" tabindex="10"> BS</label>
          </td>
        </tr>

        <tr>
          <td class="right"><label for="comments">Comments:</label></td>
          <td><textarea id="comments" name="comments" rows="4" cols="30" tabindex="11"></textarea></td>
        </tr>

        <tr>
          <td colspan="2" class="table-center">
            <input type="submit" value="Submit" tabindex="12">
            <input type="reset" value="Reset" tabindex="13">
          </td>
        </tr>

      </table>
    </form>

  </main>

  <footer>
    © 2026 Franky Foxx — Web Designer
  </footer>

</div>
</body>
</html>
